<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Component Configurator</title>
</head>
<body>
    <header>
        <div class="acoes">
            <button class="botao">Save</button>
            <button class="botao">Cancel</button>
            <button class="botao">Edit</button>
            <button class="botao">Salve Draft</button>
            <button class="botao">Load Draft</button>
            <button class="botao">Undo</button>
            <button class="botao">Redo</button>
            <button class="botao">Check</button>
            <button class="botao">tabela 1</button> <!--colocar imagem da tabela-->
            <button class="botao">tabela 2</button> <!--colocar imagem da tabela-->
            <button class="botao">tabela 3</button> <!--colocar imagem da tabela-->
            <button class="botao">Adicional Functions</button>
        </div>
    </header>
        
    <div class="navegacao">
        
        <h1>Navegação</h1>
            <div class="acoes">
                <button>New</button>
                <button>Lixeira</button> <!--colocar imagem da lixeira-->

                <button>Down</button>
                <button>Ferramenta</button> <!--colocar imagem de ferramenta-->
            </div>
                <table class="tabela-repositorios">
                    <tr>
                        <th>Page Type</th>

                    </tr>
                    <tr>
                        <td>Initial Page</td>
                        <td>INT</td>
                        <td>&ORT:/SCMTMS/UI_CMN/ADM_INFO</td>
                    </tr>
                    <tr>
                        <td>Main Page</td>
                        <td>MAIN</td>
                        <td>&ORT:/SCMTMS/UI_CMN/ADM_INFO</td>
                    </tr>
                    <tr>
                        <td>Main Page</td>
                        <td>MAIN_FAST_E</td>
                        <td>&ORT:/SCMTMS/UI_CMN/ADM_INFO</td>
                    </tr>
                </table>
            </div>
    </div>

    <main> </main>
