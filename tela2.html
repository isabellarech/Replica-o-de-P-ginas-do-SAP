<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard SAP</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">
    <div class="logo">SPA Dashboard</div>
    <nav class="nav">
        <ul>
            <li><a href="#">Início</a></li>
            <li><a href="#">Pedidos</a></li>
            <li><a href="#">Relatórios</a></li>
            <li><a href="#">Perfil</a></li>
        </ul>
    </nav>
</header>

<main class="container">

    <section class="top-grid">
        <div class="card welcome-card">
            <div class="welcome-left">
                <img src="assets/robot.png" alt="Robô assistente">
                <div>
                    <h2>Olá, tudo bem?</h2>
                    <p>Como posso ajudar hoje?</p>
                    <button class="secondary-btn">Fale comigo!</button>
                </div>
            </div>

            <div class="welcome actions">
                <button>QUERO COMPRAR MATERIAL</button>
                <button>QUERO COMPRAR SERVIÇO</button>
                <button>CONSULTAR FLUXO DE PROCESSOS</button>
                <button>STATUS DAS MINHAS REQUISIÇÕES</button>
                <button>NÃO SEI AO CERTO, ME AJUDE</button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3>Status de pedidos recentes</h3>
                <a href="#">Ver todos pedidos</a>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Nº Req.</th>
                        <th>Data</th>
                        <th>Valor</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>#125</td>
                        <td>20/04/2020</td>
                        <td>R$ 1250,50</td>
                        <td><span class="status processing">Processado</span></td>
                    </tr>
                    <tr>
                        <td>#125</td>
                        <td>20/04/2020</td>
                        <td>R$ 1250,50</td>
                        <td><span class="status alert">Alerta</span></td>
                    </tr>
                    <tr>
                        <td>#125</td>
                        <td>20/04/2020</td>
                        <td>R$ 1250,50</td>
                        <td><span class="status danger">Cancelado</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
    
</body>
</html>
